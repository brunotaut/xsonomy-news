name: Enrich companies (manual)

# One-off / occasional. Fills public.companies catalogue fields (profile +
# financials) from Claude's training knowledge only — no web. Never overwrites
# curated values; uncertain fields stay NULL; rows remain publication_status
# 'draft' for review. Resumable: re-run to continue. Does NOT deploy the site.

on:
  workflow_dispatch:
    inputs:
      max:
        description: "Max companies this run (blank = all remaining)"
        default: ""
        required: false
      concurrency:
        description: "Parallel LLM calls"
        default: "4"
        required: true
      batch:
        description: "Rows fetched per page"
        default: "25"
        required: true

permissions:
  contents: read

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Enrich company catalogue
        run: |
          MAX_ARG=""
          if [ -n "${{ github.event.inputs.max }}" ]; then MAX_ARG="--max ${{ github.event.inputs.max }}"; fi
          node scripts/enrich-companies.mjs --concurrency ${{ github.event.inputs.concurrency }} --batch ${{ github.event.inputs.batch }} $MAX_ARG
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
