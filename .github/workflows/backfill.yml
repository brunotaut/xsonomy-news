name: Historical backfill (manual)

# One-time / occasional. Crawls each outlet's sitemaps for the last N days,
# extracts headline+summary+image per article, and upserts into Supabase.
# Slow and network-heavy — run from the Actions tab when you need history.

on:
  workflow_dispatch:
    inputs:
      days:
        description: "How many days back to crawl"
        default: "300"
        required: true
      max_per_source:
        description: "Max articles per source"
        default: "300"
        required: true
      only:
        description: "Optional comma-separated source ids (blank = all)"
        default: ""
        required: false

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run backfill
        run: |
          ONLY_ARG=""
          if [ -n "${{ github.event.inputs.only }}" ]; then ONLY_ARG="--only ${{ github.event.inputs.only }}"; fi
          node scripts/backfill.mjs --days ${{ github.event.inputs.days }} --max-per-source ${{ github.event.inputs.max_per_source }} $ONLY_ARG
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
