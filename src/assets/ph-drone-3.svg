  <g transform="translate(410 150) rotate(-24)" fill="#0f141b" stroke="#93a1b5" stroke-width="3" stroke-linejoin="round">
    <path d="M-60 0 L40 0 L70 0 L58 -8 L40 0 L58 8 Z"/>
    <path d="M-10 0 L-40 -46 L-2 -8 Z"/>
    <path d="M-10 0 L-40 46 L-2 8 Z"/>
    <path d="M40 0 L60 -20 L48 -3 Z"/>
    <path d="M40 0 L60 20 L48 3 Z"/>
    <circle cx="-2" cy="0" r="5" fill="#4ea1ff" stroke="none"/>
  </g>
  <text x="30" y="42" fill="#93a1b5" font-family="monospace" font-size="14" opacity="0.7">ISR // BVLOS</text>
</svg>
