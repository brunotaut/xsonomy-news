<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 270" role="img" aria-label="Fixed-wing drone placeholder">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a212c"/><stop offset="1" stop-color="#12171f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="270" fill="url(#bg3)"/>
  <g stroke="#273140" stroke-width="1" opacity="0.5">
    <path d="M0 60H800M0 120H800M0 180H800M0 240H800"/>
  </g>
  <!-- flight path -->
  <path d="M40 210 Q260 210 380 130 T760 60" fill="none" stroke="#4ea1ff" stroke-width="2" stroke-dasharray="6 8" opacity="0.7"/>
