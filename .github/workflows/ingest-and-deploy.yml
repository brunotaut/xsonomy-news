name: Ingest & deploy news

on:
  workflow_dispatch: {}            # run manually from the Actions tab
  schedule:
    - cron: "0 5 * * *"           # daily at 05:00 UTC — poll feeds, rebuild, deploy
  push:
    branches: [main]              # rebuild when site code changes

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: news-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ingest latest headlines into Supabase
        if: github.event_name != 'push'      # skip the write on code-only pushes
        run: npm run ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Build static site
        run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SITE_URL: ${{ vars.SITE_URL }}
          HOME_URL: ${{ vars.HOME_URL }}
          CNAME: ${{ vars.NEWS_CNAME }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
